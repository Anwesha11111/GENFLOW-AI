version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: genflow_db
    environment:
      POSTGRES_USER: ${DB_USER:-n8n_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-genflow_pass}
      POSTGRES_DB: n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n_admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: genflow_cache
    command: redis-server --appendonly yes

  n8n:
    image: n8nio/n8n:latest
    container_name: genflow_engine
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${DB_USER:-n8n_admin}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-genflow_pass}
      - N8N_ENCRYPTION_KEY=${N8N_KEY:-secret_genflow_key}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PROTOCOL=http
      - NODE_FUNCTION_CAN_ACCESS_DOMAIN_MODULES=all
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - N8N_METRICS=true
      - N8N_CONCURRENT_WORKERS=20
    depends_on:
      - postgres
      - redis
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
